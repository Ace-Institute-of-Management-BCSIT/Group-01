<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote</title>
  <style>
    :root{
      --overlay: rgba(11, 86, 148, 0.72);
      --accent:#e20b2d;
      --border: rgba(255,255,255,0.22);
      --tile: rgba(255,255,255,0.10);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      height:100vh;
      overflow:hidden;
      font-family: Arial, sans-serif;
      color:#fff;
      background: url("viber_image_2026-05-26_13-27-08-940.jpg") center/cover no-repeat;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background: var(--overlay);
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      height:100vh;
      padding: 10px 14px 12px;
      width:min(1280px, 98vw);
      margin:0 auto;

      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex: 0 0 auto;
    }

    .titles h1{
      margin:0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing:.2px;
      line-height: 1.05;
    }
    .titles .hint{
      margin: 4px 0 0;
      font-size: 14px;
      font-style: italic;
      font-weight: 700;
      opacity: .95;
      line-height: 1.15;
    }

    .logo{
      width:62px;
      height:62px;
      flex:0 0 auto;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .grid{
      flex: 1 1 auto;
      min-height: 0;

      display:grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
    }

    .symbol-btn{
      width: 90px;
      height: 90px;
      border: 1px solid var(--border);
      background: var(--tile);
      border-radius: 10px;
      padding: 2px;
      cursor:pointer;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* SMALLER IMAGES:
       Lower % makes the image smaller inside each tile */
    .symbol-btn img{
      width: 70%;
      height: 70%;
      object-fit: contain;
      display:block;
      pointer-events:none;
      user-select:none;
    }

    /* responsive: still no-scroll */
    @media (max-width: 1100px){
      .grid{ grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(7, 1fr); }
    }
    @media (max-width: 820px){
      .wrap{ padding: 8px 10px 10px; }
      .titles h1{ font-size: 24px; }
      .logo{ width:56px; height:56px; }
      .grid{ grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(8, 1fr); }
      .symbol-btn img{ width: 65%; height: 65%; }
    }
    @media (max-width: 520px){
      .grid{ grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(10, 1fr); }
      .symbol-btn img{ width: 60%; height: 60%; }
    }

    /* modal */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 10;
    }
    .modal.open{ display:flex; }
    .backdrop{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0.55);
    }
    .dialog{
      position:relative;
      width:min(560px, 96vw);
      border-radius: 16px;
      background: rgba(8, 26, 44, 0.95);
      border: 1px solid rgba(255,255,255,0.16);
      padding: 18px 18px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      color:#fff;
    }
    .dialog-top{
      display:flex;
      align-items:center;
      gap: 14px;
    }
    .dialog-top img{
      width:76px;
      height:76px;
      object-fit:contain;
      flex:0 0 auto;
    }
    .dialog h2{
      margin:0;
      font-size: 22px;
      font-weight: 900;
      line-height:1.25;
    }
    .actions{
      display:flex;
      justify-content:flex-end;
      gap: 10px;
      margin-top: 16px;
    }
    .btn{
      border:none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor:pointer;
      font-size: 16px;
    }
    .btn.cancel{ background: rgba(255,255,255,0.14); color:#fff; }
    .btn.vote{ background: var(--accent); color:#fff; }
  </style>
</head>

<body>

    </div>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="backdrop" id="backdrop"></div>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="dialog-top">
        <img id="confirmImg" src="" alt="Selected symbol" />
        <h2 id="confirmTitle">Are you sure you want to vote for this symbol?</h2>
      </div>
      <div class="actions">
        <button class="btn cancel" type="button" id="cancelBtn">Cancel</button>
        <button class="btn vote" type="button" id="voteBtn">Yes, Vote</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const backdrop = document.getElementById('backdrop');
    const confirmImg = document.getElementById('confirmImg');
    const cancelBtn = document.getElementById('cancelBtn');
    const voteBtn = document.getElementById('voteBtn');

    function openModal(img){
      confirmImg.src = img;
      modal.classList.add('open');
      modal.setAttribute('aria-hidden','false');
      voteBtn.focus();
    }
    function closeModal(){
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden','true');
    }

    document.getElementById('grid').addEventListener('click', (e) => {
      const btn = e.target.closest('.symbol-btn');
      if(!btn) return;
      openModal(btn.dataset.img);
    });

    backdrop.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeModal();
    });

    voteBtn.addEventListener('click', () => {
      alert("Vote submitted successfully.");
      closeModal();
    });
  </script>
</body>
</html>
