<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>National E‑Voting System - Login</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif}

    /* Full screen background */
    .hero{
      position:relative;
      min-height:100vh;
      width:100vw;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .hero .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
       filter: brightness(0.5);
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.35);
    }

    /* Login card (like your image) */
    .card{
      position:relative;
      width:480px;
      max-width:92vw;
      background:#fff;
      border-radius:18px;
      padding:26px 24px 22px;
      box-shadow:0 25px 70px rgba(0,0,0,0.45);
      z-index:2;
      text-align:left;
    }

    .top{
      text-align:center;
    }

    .logo{
      width:92px;
      height:auto;
      display:block;
      margin:0 auto 10px;
    }

    .title{
      margin:0;
      color:#0c2f68;
      font-size:30px;
      font-weight:800;
    }

    .subtitle{
      margin:8px 0 14px;
      color:#6b7280;
      font-size:14px;
      font-weight:600;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:10px 0 18px;
      color:#0c2f68;
      opacity:.7;
    }
    .divider::before,
    .divider::after{
      content:"";
      height:1px;
      background:#cbd5e1;
      flex:1;
    }
    .dot{
      width:6px;height:6px;border-radius:50%;
      background:#0c2f68;
    }

    label{
      display:block;
      margin:14px 0 6px;
      font-weight:800;
      color:#0c2f68;
      font-size:14px;
    }

    .field{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:10px 12px;
      background:#fff;
    }

    .icon{
      width:18px;
      height:18px;
      flex:0 0 18px;
      opacity:.7;
    }

    input{
      border:none;
      outline:none;
      width:100%;
      font-size:14px;
    }

    .btn{
      margin-top:18px;
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:10px;
      background:#0c2f68;
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      transition:0.2s ease;
    }
    .btn:hover{
      background:#0a3c86;
      box-shadow:0 10px 22px rgba(12,47,104,0.35);
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <div class="hero">
    <!-- same background image -->
    <img class="bg"
      src="c:\Users\siddh\OneDrive\文档\ViberDownloads\0-02-03-95b8c1bd0603e7ed06e7c07e4c5a25257fdc55a9d20b1ab4d0320b03d18c64ad_d6a95fe373cc898b.jpg"
      alt="Mountain background" />
    <div class="overlay"></div>

    <!-- login form card -->
    <form class="card">
      <div class="top">
        <!-- Use your emblem file here (example: emblem.png) -->
        <img class="logo" src="Emblem_of_Nepal.svg" alt="Nepal emblem" />
        <h1 class="title">National E‑Voting System</h1>
        <p class="subtitle">Committed to Transparency, Security, and Electoral Integrity</p>
        <div class="divider"><span class="dot"></span></div>
      </div>

      <label>Citizenship Number</label>
      <div class="field">
        <!-- simple inline SVG icon -->
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="16" rx="2"></rect>
          <path d="M7 8h6M7 12h10M7 16h10"></path>
        </svg>
        <input type="text" placeholder="Enter your citizenship number" />
      </div>

      <label>Email</label>
      <div class="field">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16v16H4z"></path>
          <path d="m4 7 8 6 8-6"></path>
        </svg>
        <input type="email" placeholder="Enter your email address" />
      </div>

      <label>Name</label>
      <div class="field">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="8" r="4"></circle>
        </svg>
        <input type="text" placeholder="Enter your full name" />
      </div>

      <label>Voter ID</label>
      <div class="field">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="M7 9h6M7 13h10"></path>
        </svg>
        <input type="text" placeholder="Enter your voter ID" />
      </div>

      <button class="btn" type="submit">Login</button>
    </form>
  </div>
</body>
</html>
